<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SAFECORE - Emergency Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&amp;family=Space+Grotesk:wght@300;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-surface": "#e5e2e1",
                "outline-variant": "#5d3f3b",
                "on-primary": "#690003",
                "on-tertiary": "#003545",
                "surface-variant": "#353534",
                "on-secondary-container": "#633700",

                "inverse-surface": "#e5e2e1",
                "on-tertiary-container": "#002e3c",
                "secondary-fixed": "#ffdcbf",
                "surface-dim": "#131313",
                "primary": "#ffb4aa",
                "on-secondary": "#4b2800",
                "tertiary": "#68d3fc",
                "surface-container-lowest": "#0e0e0e",
                "surface-container": "#201f1f",
                "primary-container": "#ff5545",
                "on-tertiary-fixed": "#001f29",
                "secondary-fixed-dim": "#ffb874",
                "on-error": "#690005",
                "surface-container-high": "#2a2a2a",
                "secondary-container": "#fe9400",
                "on-error-container": "#ffdad6",
                "primary-fixed": "#ffdad5",
                "tertiary-container": "#1d9cc3",
                "surface-tint": "#ffb4aa",
                "inverse-on-surface": "#313030",
                "secondary": "#ffbc7c",
                "on-primary-fixed-variant": "#930005",
                "on-secondary-fixed-variant": "#6a3b00",
                "tertiary-fixed-dim": "#68d3fc",
                "on-surface-variant": "#e7bdb7",
                "on-secondary-fixed": "#2d1600",
                "primary-fixed-dim": "#ffb4aa",
                "on-tertiary-fixed-variant": "#004d63",
                "outline": "#ad8883",
                "error-container": "#93000a",
                "surface": "#131313",
                "surface-bright": "#393939",
                "surface-container-low": "#1c1b1b",
                "error": "#ffb4ab",
                "on-primary-container": "#5c0002",
                "surface-container-highest": "#353534",
                "on-primary-fixed": "#410001",
                "tertiary-fixed": "#bbe9ff",
                "background": "#131313"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "fontFamily": {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Space Grotesk"]
            }
          },
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            overflow: hidden;
            background-color: #131313;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body h-screen flex flex-col items-center justify-between overflow-hidden">
<!-- TopAppBar Fragment (Supressed Nav, High Priority Header) -->
<header class="bg-[#131313] fixed top-0 w-full z-50 flex justify-between items-center px-6 h-20 w-full no-border tonal-shift bg-neutral-900">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-red-600 text-3xl">emergency</span>
<span class="font-headline font-black tracking-tighter text-[#e5e2e1] text-2xl">SAFECORE</span>
</div>
<div class="flex items-center gap-2 bg-red-600/10 px-4 py-1.5 rounded-full border border-red-600/20">
<span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
<span class="font-label text-[10px] uppercase tracking-widest text-red-500 font-bold">Step 2 of 4</span>
</div>
</header>
<!-- Main Centered Content (Fullscreen Task Focus) -->
<main class="flex-1 w-full max-w-lg mx-auto flex flex-col items-center justify-center px-8 pt-20">
<!-- Step Indicator & Context -->
<div class="mb-12 text-center">
<h2 class="font-label text-red-500 text-sm tracking-[0.3em] uppercase mb-4">Immediate Action Required</h2>
</div>
<!-- Instructional Visual (Abstract Clarity) -->
<div class="relative w-full aspect-square max-w-[320px] mb-12 flex items-center justify-center">
<!-- Background Tonal Glow -->
<div class="absolute inset-0 bg-red-600/20 blur-[120px] rounded-full"></div>
<!-- Graphic Illustration Container -->
<div class="relative z-10 w-full h-full bg-surface-container-high rounded-[3rem] p-1 shadow-2xl flex flex-col overflow-hidden">
<img class="w-full h-full object-cover opacity-50 grayscale contrast-125 mix-blend-luminosity" data-alt="Interior of a modern living room showing a heavy solid wood table with low dramatic emergency lighting cast from shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgUKPRaLHuUaCGkmCjJYjmt0BECTp3xyutB7hjd2P_cUenL2O4h_AWGbpY5OkogBHvWhDhcE0dhzEoOsVjsO69_7d858asL8CKkf0YTR_fkGwjqPVMNlm4MinCOy4zez7R2xG_5p2MULQmsoKZZpp4pCB3edwOh-amfeMbHxT9eYay-D5l9INpYUHGOlDnjKg58w-begOe1jtN44M0O7CbYLk6pZQgbT3o9EPAXGDg8Xi8tbtJyQvCuuT3_eoR7uSKd3aYQehPBc-K"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-red-600/90 text-white p-8 rounded-full shadow-[0_0_50px_rgba(255,85,69,0.5)]">
<span class="material-symbols-outlined text-6xl" style="font-variation-settings: 'FILL' 1;">table_restaurant</span>
</div>
</div>
</div>
</div>
<!-- The "Voice of Command" Headline -->
<h1 class="font-headline font-black text-4xl md:text-5xl text-center leading-[1.1] tracking-tighter text-on-surface">
            Take <span class="text-red-600">COVER</span> under sturdy furniture
        </h1>
<p class="mt-8 text-on-surface-variant font-body text-lg text-center leading-relaxed opacity-80 max-w-xs">
            Avoid windows and heavy objects that could fall. Stay low until the shaking stops.
        </p>
</main>
<!-- Navigation/Action Shell -->
<footer class="w-full p-8 pb-12 flex flex-col items-center gap-6">
<!-- Floating SOS Trigger / Next Button -->
<button class="w-full h-20 bg-primary-container text-on-primary-container rounded-xl flex items-center justify-center gap-4 transition-transform active:scale-95 group">
<span class="font-headline font-black text-2xl tracking-tighter uppercase">NEXT</span>
<span class="material-symbols-outlined text-3xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Secondary Focused Action -->
<button class="flex items-center gap-2 py-4 px-8 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-xl">help</span>
<span class="font-label text-xs uppercase tracking-widest font-bold">Instruction Details</span>
</button>
</footer>
<!-- Overlay "Pulse" Indicator (App-Specific Passive Reassurance) -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-surface-container-high overflow-hidden">
<div class="h-full bg-red-600 w-1/4 animate-[pulse_2s_infinite]"></div>
</div>
</body></html>
